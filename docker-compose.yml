version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: cryptobank_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: RootPass@2026
      MYSQL_DATABASE: cryptobank
      MYSQL_USER: cryptobank_user
      MYSQL_PASSWORD: StrongPassword@2026
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cryptobank_api
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: mysql://cryptobank_user:StrongPassword@2026@db:3306/cryptobank
      JWT_SECRET: CryptoBankJWT_SuperSecret_2026
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node src/app.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cryptobank_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysql_data:
